services:
  prompt-tools:
    build: .
    ports:
      # Bind to loopback by default — do not expose the unauthenticated API on all interfaces.
      - "127.0.0.1:47832:47832"
    environment:
      PORT: 47832
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-http://ollama:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-hermes3}
      COMFYUI_API_URL: ${COMFYUI_API_URL:-http://comfyui:8188}
      PROMPT_API_URL: http://prompt-tools:47832
      PROMPT_API_TOKEN: ${PROMPT_API_TOKEN:-}
      COMFYUI_ALLOW_CLIENT_URL: ${COMFYUI_ALLOW_CLIENT_URL:-true}
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest
    profiles: ["comfyui"]
    ports:
      - "127.0.0.1:8188:8188"
    environment:
      COMFY_PROMPT_API_URL: http://prompt-tools:47832
      PROMPT_API_TOKEN: ${PROMPT_API_TOKEN:-}
    depends_on:
      - prompt-tools
    restart: unless-stopped

volumes:
  ollama_data:
