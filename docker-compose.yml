services:
  prompt-tools:
    build: .
    ports:
      - "47832:47832"
    environment:
      PORT: 47832
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-http://ollama:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-hermes3}
      COMFYUI_API_URL: ${COMFYUI_API_URL:-http://comfyui:8188}
      PROMPT_API_URL: http://prompt-tools:47832
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest
    profiles: ["comfyui"]
    ports:
      - "8188:8188"
    environment:
      COMFY_PROMPT_API_URL: http://prompt-tools:47832
    depends_on:
      - prompt-tools
    restart: unless-stopped

volumes:
  ollama_data:
